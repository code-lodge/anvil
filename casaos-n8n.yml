name: n8n-docker
services:
  main_app:
    cpu_shares: 10
    command: []
    container_name: n8n
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - N8N_SECURE_COOKIE=false
      - NODES_EXCLUDE=[]
      - RCLONE_CONFIG=/home/node/data/rclone/rclone.conf
    hostname: n8n
    image: n8n-with-docker:latest
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/N8n/icon.png
    ports:
      - target: 5678
        published: "5678"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /DATA/Data
        target: /home/node/data
      - type: bind
        source: /DATA/AppData/n8n-docker
        target: /home/node/.n8n
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/N8n/icon.png
  index: /
  is_uncontrolled: false
  port_map: "5678"
  scheme: http
  store_app_id: n8n-docker
  title:
    custom: n8n
